<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}" />
  <meta name="google-site-verification" content="4rJnPnmaEMUoRZbEtR9JvTYfTQ3-0VShpXisItcjCAg" />
  <style>
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --line: #e5e7eb;
      --link: #0f766e;
      --link-hover: #115e59;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 18px 40px;
    }

    .nav {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      font-size: 0.95rem;
    }

    .nav a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }

    .nav a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    .article {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px 20px;
    }

    h1, h2, h3 {
      line-height: 1.35;
      margin-top: 1.2em;
      margin-bottom: 0.55em;
    }

    h1 { margin-top: 0; }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    pre, code {
      font-family: Consolas, "Courier New", monospace;
    }

    pre {
      overflow: auto;
      background: #0b1220;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      white-space: nowrap;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav" aria-label="Primary">
      <a href="/ai-tools-review/">AI Tools Review</a>
      <a href="/ai-tools-review/articles.html">Articles</a>
    </nav>
    <main class="article">
      <h1>{{ page.title }}</h1>
      {{ content }}
    </main>
  </div>
</body>
</html>
